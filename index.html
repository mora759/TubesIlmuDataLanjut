<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Besar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
</head>
<body class="p-6">

    <div class="mb-8 p-4 border rounded">
        <h2 class="font-bold mb-2">Prediksi Biaya (Machine Learning)</h2>
        <input type="number" id="inputUmur" placeholder="Umur" class="border p-2">
        <input type="number" id="inputBmi" placeholder="BMI" class="border p-2">
        <button onclick="prediksiRegresi()" class="bg-blue-500 text-white p-2">Prediksi Biaya</button>
        <div id="hasilRegresi" class="hidden mt-2 p-2 bg-gray-100"></div>
    </div>

    <div id="statusModel" class="mb-4">Memuat model...</div>
    <input type="file" id="inputGambar" accept="image/*" class="mb-4">
    <div id="placeholderText">Silakan pilih gambar</div>
    <img id="previewGambar" class="hidden max-w-xs" src="" alt="Preview">
    <button onclick="prediksiGambar()" class="bg-green-500 text-white p-2 mt-4">Prediksi Gambar</button>
    <div id="hasilKlasifikasi" class="hidden mt-2 p-2 bg-gray-100"></div>

    <script>
    window.addEventListener("DOMContentLoaded", () => {
        let modelCNN = null;
        let modelRegresi = null;

        // =====================
        // MEMUAT MODEL (CNN & REGRESI)
        // =====================
        async function loadModels() {
            console.log("TensorFlow :", tf.version.tfjs);
            try {
                // Menggunakan URL relatif agar lebih portable
                modelCNN = await tf.loadLayersModel("./tfjs_model/model.json");
                // Ganti "./tfjs_model_regresi/model.json" dengan path model regresi Anda
                // modelRegresi = await tf.loadLayersModel("./tfjs_model_regresi/model.json");
                
                console.log("Models Loaded");
                document.getElementById("statusModel").innerHTML = "✅ Model berhasil dimuat";
            } catch (err) {
                console.error("Gagal memuat model:", err);
                document.getElementById("statusModel").innerHTML = "❌ Gagal memuat model";
            }
        }

        if (typeof tf !== "undefined") {
            loadModels();
        }

        // =====================
        // PREDIKSI REGRESI (ML)
        // =====================
        window.prediksiRegresi = async function() {
            const umur = parseFloat(document.getElementById("inputUmur").value);
            const bmi = parseFloat(document.getElementById("inputBmi").value);

            if (isNaN(umur) || isNaN(bmi)) return alert("Masukkan angka!");

            // Jika model belum diintegrasikan, beri peringatan
            if (!modelRegresi) {
                alert("Model regresi belum dimuat atau belum diintegrasikan.");
                return;
            }

            const input = tf.tensor2d([[umur, bmi]]);
            const prediksi = modelRegresi.predict(input);
            const nilai = await prediksi.data();

            document.getElementById("hasilRegresi").classList.remove("hidden");
            document.getElementById("hasilRegresi").innerHTML = `Estimasi: $${nilai[0].toFixed(2)}`;
            
            prediksi.dispose();
            input.dispose();
        };

        // =====================
        // PREDIKSI KLASIFIKASI (CNN)
        // =====================
        window.prediksiGambar = async function() {
            const preview = document.getElementById("previewGambar");
            if (!modelCNN) return alert("Model CNN belum selesai dimuat.");
            if (!preview.src || preview.classList.contains("hidden")) {
                return alert("Pilih gambar terlebih dahulu.");
            }

            if (!preview.complete) await preview.decode();

            const hasil = tf.tidy(() => {
                const tensor = tf.browser.fromPixels(preview)
                    .resizeBilinear([128, 128])
                    .toFloat()
                    .div(255.0)
                    .expandDims();
                return modelCNN.predict(tensor);
            });

            const prob = await hasil.data();
            hasil.dispose();

            const classNames = ["Daisy", "Dandelion", "Roses", "Sunflowers", "Tulips"];
            const index = prob.indexOf(Math.max(...prob));
            
            const divHasil = document.getElementById("hasilKlasifikasi");
            divHasil.classList.remove("hidden");
            divHasil.innerHTML = `<b>${classNames[index]}</b><br>Akurasi : ${(prob[index] * 100).toFixed(2)}%`;
        };
    });
    </script>
</body>
</html>
