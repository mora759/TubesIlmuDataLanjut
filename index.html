<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Besar Ilmu Data - AI Deployment</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans p-6 md:p-12">

<div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">

    <div class="bg-blue-600 text-white p-6 text-center">
        <h1 class="text-3xl font-bold">Portal AI: Tugas Besar</h1>
        <p class="mt-2 opacity-90">
            Deployment Model Regresi Linear & Klasifikasi Citra
        </p>
    </div>

    <div class="p-6 md:p-8 grid md:grid-cols-2 gap-8">

        <!-- REGRESI -->
        <div class="bg-blue-50 p-6 rounded-lg border border-blue-100">

            <h2 class="text-2xl font-semibold mb-4 text-blue-800">
                1. Prediksi Biaya Medis
            </h2>

            <div class="space-y-4">

                <input
                    type="number"
                    id="inputUmur"
                    class="w-full border rounded-md p-2"
                    placeholder="Umur">

                <input
                    type="number"
                    id="inputBmi"
                    class="w-full border rounded-md p-2"
                    placeholder="BMI">

                <button
                    onclick="prediksiRegresi()"
                    class="w-full bg-blue-600 text-white py-2 rounded">

                    Hitung Estimasi

                </button>

                <div
                    id="hasilRegresi"
                    class="hidden mt-4 p-4 bg-white rounded border text-center font-bold">
                </div>

            </div>

        </div>

        <!-- CNN -->

        <div class="bg-green-50 p-6 rounded-lg border border-green-100">

            <h2 class="text-2xl font-semibold mb-4 text-green-800">
                2. Klasifikasi Gambar
            </h2>

            <p
                id="statusModel"
                class="text-xs font-semibold text-yellow-600 mb-4">

                Memuat model AI...

            </p>

            <div class="space-y-4">

                <input
                    type="file"
                    id="inputGambar"
                    accept="image/*">

                <div
                    class="flex justify-center items-center min-h-[150px] border-2 border-dashed rounded bg-white">

                    <img
                        id="previewGambar"
                        class="hidden max-h-40 rounded">

                    <span id="placeholderText">
                        Preview Gambar
                    </span>

                </div>

                <button
                    onclick="prediksiGambar()"
                    class="w-full bg-green-600 text-white py-2 rounded">

                    Deteksi Gambar

                </button>

                <div
                    id="hasilKlasifikasi"
                    class="hidden mt-4 p-4 bg-white rounded border text-center font-bold">
                </div>

            </div>

        </div>

    </div>

</div>

<script>

function toCamelCase(obj){

    if(obj===null || typeof obj!=="object") return obj;

    if(Array.isArray(obj))
        return obj.map(toCamelCase);

    return Object.keys(obj).reduce((acc,key)=>{

        const camelKey=key.replace(/(_\w)/g,m=>m[1].toUpperCase());

        acc[camelKey]=toCamelCase(obj[key]);

        return acc;

    },{});

}

function prediksiRegresi(){

    const umur=parseFloat(document.getElementById("inputUmur").value);

    const bmi=parseFloat(document.getElementById("inputBmi").value);

    if(isNaN(umur)||isNaN(bmi))
        return alert("Masukkan angka!");

    const hasil=-6317.02+(243.68*umur)+(345.21*bmi);

    const div=document.getElementById("hasilRegresi");

    div.classList.remove("hidden");

    div.innerHTML=
    `Estimasi Biaya <br>
    <span class="text-2xl">$${hasil.toFixed(2)}</span>`;

}

let modelCNN;

const classNames=[
'Daisy',
'Dandelion',
'Roses',
'Sunflowers',
'Tulips'
];

async function loadModel(){

    try{

        console.log("Memulai load model...");

        const modelUrl=
        "https://raw.githubusercontent.com/mora759/TubesIlmuDataLanjut/main/tfjs_model/model.json?t="+Date.now();

        console.log(modelUrl);

        const response=await fetch(modelUrl);

        console.log(response);

        const rawJson=await response.json();

        console.log("JSON berhasil dibaca");

        const cleanJson=toCamelCase(rawJson);

        console.log(cleanJson);

        modelCNN=await tf.loadLayersModel(

            tf.io.fromMemory(cleanJson)

        );

        console.log(modelCNN);

        document.getElementById("statusModel").innerHTML=
        "✅ Model Siap!";

        document.getElementById("statusModel").className=
        "text-xs font-bold text-green-600 mb-4";

    }

    catch(error){

        console.error("======================");

        console.error("ERROR ASLI");

        console.error(error);

        console.error("MESSAGE:");

        console.error(error.message);

        console.error("STACK:");

        console.error(error.stack);

        console.error("======================");

        document.getElementById("statusModel").innerHTML=
        "<b>❌ Error:</b><br>"+error.message;

        document.getElementById("statusModel").className=
        "text-xs font-bold text-red-600 mb-4";

    }

}

loadModel();

const input=document.getElementById("inputGambar");

const preview=document.getElementById("previewGambar");

input.addEventListener("change",e=>{

    const reader=new FileReader();

    reader.onload=function(event){

        preview.src=event.target.result;

        preview.classList.remove("hidden");

        document.getElementById("placeholderText").classList.add("hidden");

    }

    reader.readAsDataURL(e.target.files[0]);

});

async function prediksiGambar(){

    if(!modelCNN){

        alert("Model belum siap!");

        return;

    }

    try{

        const tensor=tf.browser.fromPixels(preview)
            .resizeNearestNeighbor([128,128])
            .toFloat()
            .div(255)
            .expandDims();

        const hasil=await modelCNN.predict(tensor).data();

        const index=hasil.indexOf(Math.max(...hasil));

        document.getElementById("hasilKlasifikasi").classList.remove("hidden");

        document.getElementById("hasilKlasifikasi").innerHTML=
        `Terdeteksi :
        ${classNames[index]}
        (${(hasil[index]*100).toFixed(2)}%)`;

    }

    catch(e){

        console.error(e);

        alert(e.message);

    }

}

</script>

</body>
</html>
