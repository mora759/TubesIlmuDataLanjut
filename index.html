<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Besar Ilmu Data - AI Deployment</title>
    <!-- Memuat Tailwind CSS untuk tampilan (Tanpa perlu install) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Memuat TensorFlow.js untuk klasifikasi gambar -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6 md:p-12">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-blue-600 text-white p-6 text-center">
            <h1 class="text-3xl font-bold">Portal AI: Tugas Besar Ilmu Data</h1>
            <p class="mt-2 opacity-90">Deployment Model Regresi Linear & Klasifikasi Citra Berbasis Web (Serverless)</p>
        </div>

        <div class="p-6 md:p-8 grid md:grid-cols-2 gap-8">
            
            <!-- BAGIAN 1: REGRESI LINEAR -->
            <div class="bg-blue-50 p-6 rounded-lg border border-blue-100">
                <h2 class="text-2xl font-semibold mb-4 text-blue-800">1. Prediksi Biaya Medis</h2>
                <p class="text-sm text-gray-600 mb-4">Metode: Regresi Linear Berganda</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Umur (Tahun)</label>
                        <input type="number" id="inputUmur" class="w-full border-gray-300 rounded-md p-2 border" placeholder="Contoh: 30">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">BMI (Body Mass Index)</label>
                        <input type="number" id="inputBmi" class="w-full border-gray-300 rounded-md p-2 border" placeholder="Contoh: 25.5">
                    </div>
                    <button onclick="prediksiRegresi()" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700 transition">Hitung Estimasi Biaya</button>
                    
                    <div id="hasilRegresi" class="mt-4 p-4 bg-white rounded border text-center font-bold text-lg text-blue-900 shadow-inner hidden">
                        <!-- Hasil regresi muncul di sini -->
                    </div>
                </div>
            </div>

            <!-- BAGIAN 2: KLASIFIKASI GAMBAR -->
            <div class="bg-green-50 p-6 rounded-lg border border-green-100">
                <h2 class="text-2xl font-semibold mb-4 text-green-800">2. Klasifikasi Gambar</h2>
                <p class="text-sm text-gray-600 mb-4">Metode: Convolutional Neural Network (CNN)</p>
                <p id="statusModel" class="text-xs font-semibold text-yellow-600 mb-4">Sedang memuat model AI...</p>

                <div class="space-y-4">
                    <input type="file" id="inputGambar" accept="image/*" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-green-100 file:text-green-700 hover:file:bg-green-200">
                    
                    <div class="flex justify-center border-2 border-dashed border-green-300 p-2 rounded-lg min-h-[150px] bg-white items-center">
                        <img id="previewGambar" class="max-h-40 hidden rounded shadow-sm" alt="Preview">
                        <span id="placeholderText" class="text-gray-400 text-sm">Pilih gambar untuk melihat preview</span>
                    </div>

                    <button onclick="prediksiGambar()" class="w-full bg-green-600 text-white font-semibold py-2 rounded-md hover:bg-green-700 transition">Deteksi Gambar</button>
                    
                    <div id="hasilKlasifikasi" class="mt-4 p-4 bg-white rounded border text-center font-bold text-lg text-green-900 shadow-inner hidden">
                        <!-- Hasil klasifikasi muncul di sini -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        // ==========================================
        // 1. LOGIKA REGRESI LINEAR
        // ==========================================
        function prediksiRegresi() {
            const umur = parseFloat(document.getElementById('inputUmur').value);
            const bmi = parseFloat(document.getElementById('inputBmi').value);

            if (isNaN(umur) || isNaN(bmi)) {
                alert("Harap masukkan angka yang valid untuk Umur dan BMI!");
                return;
            }

            // PENTING: Ganti angka di bawah ini dengan hasil cetakan (print) dari Google Colab Cell 5 milikmu!
            const intercept = -6317.02; // Ganti dengan angka intercept-mu
            const bobotUmur = 243.68;   // Ganti dengan angka bobot umur-mu
            const bobotBmi = 345.21;    // Ganti dengan angka bobot BMI-mu

            // Rumus regresi linear berganda
            const prediksi = intercept + (bobotUmur * umur) + (bobotBmi * bmi);

            const divHasil = document.getElementById('hasilRegresi');
            divHasil.classList.remove('hidden');
            divHasil.innerHTML = `Estimasi Biaya: <br> <span class="text-2xl">$${prediksi.toFixed(2)}</span>`;
        }

        // ==========================================
        // 2. LOGIKA KLASIFIKASI GAMBAR (CNN)
        // ==========================================
        let modelCNN;
        // Daftar nama kelas sesuai dataset (Dataset bunga: 5 kelas)
        const classNames = ['Daisy (Bunga Aster)', 'Dandelion', 'Roses (Mawar)', 'Sunflowers (Matahari)', 'Tulips'];

        // Fungsi memuat model dari folder 'tfjs_model'
        async function loadModel() {
            try {
                // Asumsinya folder tfjs_model berada di tempat (direktori) yang sama dengan index.html ini
                modelCNN = await tf.loadLayersModel('./tfjs_model/model.json');
                document.getElementById('statusModel').innerText = "✅ Model Gambar Siap Digunakan!";
                document.getElementById('statusModel').className = "text-xs font-bold text-green-600 mb-4";
            } catch (error) {
                console.error(error);
                document.getElementById('statusModel').innerText = "❌ Gagal memuat model. Pastikan folder tfjs_model sudah di-upload ke GitHub!";
                document.getElementById('statusModel').className = "text-xs font-bold text-red-600 mb-4";
            }
        }
        
        // Memuat model segera setelah halaman web terbuka
        loadModel();

        // Fitur untuk preview gambar yang diupload
        const inputGambar = document.getElementById('inputGambar');
        const previewGambar = document.getElementById('previewGambar');
        const placeholderText = document.getElementById('placeholderText');

        inputGambar.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewGambar.src = e.target.result;
                    previewGambar.classList.remove('hidden');
                    placeholderText.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // Fungsi untuk melakukan prediksi pada gambar
        async function prediksiGambar() {
            if (!modelCNN) {
                alert("Model belum selesai dimuat. Tunggu sebentar.");
                return;
            }
            if (previewGambar.classList.contains('hidden')) {
                alert("Harap pilih dan masukkan gambar terlebih dahulu.");
                return;
            }

            const divHasil = document.getElementById('hasilKlasifikasi');
            divHasil.classList.remove('hidden');
            divHasil.innerText = "Memproses...";

            try {
                // Preprocessing citra agar sesuai dengan input model (128x128 pixel, rescale 1./255)
                const tensor = tf.browser.fromPixels(previewGambar)
                    .resizeNearestNeighbor([128, 128])
                    .toFloat()
                    .div(tf.scalar(255.0))
                    .expandDims();

                // Lakukan Prediksi
                const prediksi = await modelCNN.predict(tensor).data();
                
                // Cari probabilitas tertinggi
                const indeksTerbesar = prediksi.indexOf(Math.max(...prediksi));
                const persentase = (prediksi[indeksTerbesar] * 100).toFixed(2);
                const hasilKelas = classNames[indeksTerbesar];

                divHasil.innerHTML = `Terdeteksi: <br> <span class="text-2xl">${hasilKelas}</span> <br> <span class="text-sm font-normal text-gray-600">Akurasi deteksi: ${persentase}%</span>`;
            } catch (error) {
                console.error(error);
                divHasil.innerHTML = "<span class='text-red-500'>Terjadi kesalahan saat memproses gambar.</span>";
            }
        }
    </script>
</body>
</html>
