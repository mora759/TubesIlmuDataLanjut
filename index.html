<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Besar Ilmu Data - AI Deployment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6 md:p-12">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-blue-600 text-white p-6 text-center">
            <h1 class="text-3xl font-bold">Portal AI: Tugas Besar Ilmu Data</h1>
            <p class="mt-2 opacity-90">Deployment Model Regresi Linear & Klasifikasi Citra Berbasis Web (Serverless)</p>
        </div>

        <div class="p-6 md:p-8 grid md:grid-cols-2 gap-8">
            
            <div class="bg-blue-50 p-6 rounded-lg border border-blue-100">
                <h2 class="text-2xl font-semibold mb-4 text-blue-800">1. Prediksi Biaya Medis</h2>
                <div class="space-y-4">
                    <input type="number" id="inputUmur" class="w-full border-gray-300 rounded-md p-2 border" placeholder="Umur (Tahun)">
                    <input type="number" id="inputBmi" class="w-full border-gray-300 rounded-md p-2 border" placeholder="BMI">
                    <button onclick="prediksiRegresi()" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700 transition">Hitung Estimasi</button>
                    <div id="hasilRegresi" class="mt-4 p-4 bg-white rounded border text-center font-bold text-lg text-blue-900 shadow-inner hidden"></div>
                </div>
            </div>

            <div class="bg-green-50 p-6 rounded-lg border border-green-100">
                <h2 class="text-2xl font-semibold mb-4 text-green-800">2. Klasifikasi Gambar</h2>
                <p id="statusModel" class="text-xs font-semibold text-yellow-600 mb-4">Memuat model AI...</p>
                <div class="space-y-4">
                    <input type="file" id="inputGambar" accept="image/*" class="w-full text-sm">
                    <div class="flex justify-center border-2 border-dashed border-green-300 p-2 rounded-lg min-h-[150px] bg-white items-center">
                        <img id="previewGambar" class="max-h-40 hidden rounded shadow-sm" alt="Preview">
                        <span id="placeholderText" class="text-gray-400 text-sm">Preview Gambar</span>
                    </div>
                    <button onclick="prediksiGambar()" class="w-full bg-green-600 text-white font-semibold py-2 rounded-md hover:bg-green-600 transition">Deteksi Gambar</button>
                    <div id="hasilKlasifikasi" class="mt-4 p-4 bg-white rounded border text-center font-bold text-lg text-green-900 shadow-inner hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function prediksiRegresi() {
            const umur = parseFloat(document.getElementById('inputUmur').value);
            const bmi = parseFloat(document.getElementById('inputBmi').value);
            if (isNaN(umur) || isNaN(bmi)) return alert("Masukkan angka!");
            const prediksi = -6317.02 + (243.68 * umur) + (345.21 * bmi);
            const divHasil = document.getElementById('hasilRegresi');
            divHasil.classList.remove('hidden');
            divHasil.innerHTML = `Estimasi Biaya: <br> <span class="text-2xl">$${prediksi.toFixed(2)}</span>`;
        }

        let modelCNN;
        const classNames = ['Daisy', 'Dandelion', 'Roses', 'Sunflowers', 'Tulips'];

        async function loadModel() {
            try {
                const modelUrl = `https://raw.githubusercontent.com/mora759/TubesIlmuDataLanjut/main/tfjs_model/model.json?t=${Date.now()}`;
                
                // Menambahkan konfigurasi input eksplisit untuk mengatasi error InputLayer
                modelCNN = await tf.loadLayersModel(modelUrl, {
                    inputShape: [128, 128, 3]
                });
                
                document.getElementById('statusModel').innerText = "✅ Model Siap!";
                document.getElementById('statusModel').className = "text-xs font-bold text-green-600 mb-4";
            } catch (error) {
                console.error("Detail Error:", error);
                document.getElementById('statusModel').innerText = "❌ Error: " + error.message;
                document.getElementById('statusModel').className = "text-xs font-bold text-red-600 mb-4";
            }
        }
        
        loadModel();

        const inputGambar = document.getElementById('inputGambar');
        const previewGambar = document.getElementById('previewGambar');

        inputGambar.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                previewGambar.src = event.target.result;
                previewGambar.classList.remove('hidden');
                document.getElementById('placeholderText').classList.add('hidden');
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        async function prediksiGambar() {
            if (!modelCNN) return alert("Model belum siap, periksa konsol (F12)!");
            try {
                const tensor = tf.browser.fromPixels(previewGambar)
                    .resizeNearestNeighbor([128, 128])
                    .toFloat()
                    .div(tf.scalar(255.0))
                    .expandDims();
                const prediksi = await modelCNN.predict(tensor).data();
                const index = prediksi.indexOf(Math.max(...prediksi));
                const hasil = document.getElementById('hasilKlasifikasi');
                hasil.classList.remove('hidden');
                hasil.innerHTML = `Terdeteksi: ${classNames[index]} (${(prediksi[index]*100).toFixed(2)}%)`;
            } catch (e) {
                alert("Gagal prediksi: " + e.message);
            }
        }
    </script>
</body>
</html>
