<script>

function prediksiRegresi(){

    const umur = parseFloat(document.getElementById("inputUmur").value);
    const bmi = parseFloat(document.getElementById("inputBmi").value);

    if(isNaN(umur) || isNaN(bmi)){
        alert("Masukkan angka!");
        return;
    }

    const hasil = -6317.02 + (243.68 * umur) + (345.21 * bmi);

    const div = document.getElementById("hasilRegresi");
    div.classList.remove("hidden");

    div.innerHTML = `
        Estimasi Biaya<br>
        <span class="text-2xl">$${hasil.toFixed(2)}</span>
    `;
}

// =====================
// MODEL CNN
// =====================

let modelCNN = null;

const classNames = [
    "Daisy",
    "Dandelion",
    "Roses",
    "Sunflowers",
    "Tulips"
];

async function loadModel(){

    try{

        modelCNN = await tf.loadLayersModel(
            "https://raw.githubusercontent.com/mora759/TubesIlmuDataLanjut/main/tfjs_model/model.json"
        );

        console.log(modelCNN.summary());

        document.getElementById("statusModel").innerHTML="✅ Model berhasil dimuat";
        document.getElementById("statusModel").className="text-green-600 font-bold";

    }

    catch(err){

        console.error(err);

        document.getElementById("statusModel").innerHTML=
        "❌ "+err.message;

        document.getElementById("statusModel").className=
        "text-red-600 font-bold";

    }

}

loadModel();

// =====================
// PREVIEW GAMBAR
// =====================

const input=document.getElementById("inputGambar");
const preview=document.getElementById("previewGambar");

input.addEventListener("change",function(e){

    const file=e.target.files[0];

    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(event){

        preview.onload=function(){

            console.log("Preview siap.");

        }

        preview.src=event.target.result;

        preview.classList.remove("hidden");

        document.getElementById("placeholderText").classList.add("hidden");

    }

    reader.readAsDataURL(file);

});

// =====================
// PREDIKSI
// =====================

async function prediksiGambar(){

    if(modelCNN==null){

        alert("Model belum selesai dimuat.");

        return;

    }

    if(preview.src==""){

        alert("Pilih gambar terlebih dahulu.");

        return;

    }

    await preview.decode();

    const hasil=tf.tidy(()=>{

        const tensor=tf.browser.fromPixels(preview)
        .resizeBilinear([128,128])
        .toFloat()
        .div(255.0)
        .expandDims();

        return modelCNN.predict(tensor);

    });

    const probabilitas=await hasil.data();

    hasil.dispose();

    console.log(probabilitas);

    const index=probabilitas.indexOf(Math.max(...probabilitas));

    document.getElementById("hasilKlasifikasi").classList.remove("hidden");

    document.getElementById("hasilKlasifikasi").innerHTML=
    `
    <b>${classNames[index]}</b><br>
    Akurasi : ${(probabilitas[index]*100).toFixed(2)}%
    `;

}

</script>
