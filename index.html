<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Besar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
</head>
<body>

    <div id="statusModel">Memuat model...</div>
    <input type="file" id="inputGambar" accept="image/*">
    <img id="previewGambar" class="hidden" src="" alt="Preview">
    <div id="placeholderText">Pilih gambar...</div>
    <div id="hasilKlasifikasi" class="hidden"></div>
    
    <script>
    window.addEventListener("DOMContentLoaded", () => {
        
        // =====================
        // FUNGSI REGRESI
        // =====================
        window.prediksiRegresi = function() {
            const umur = parseFloat(document.getElementById("inputUmur").value);
            const bmi = parseFloat(document.getElementById("inputBmi").value);

            if (isNaN(umur) || isNaN(bmi)) {
                alert("Masukkan angka!");
                return;
            }

            const hasil = -6317.02 + (243.68 * umur) + (345.21 * bmi);
            const div = document.getElementById("hasilRegresi");
            div.classList.remove("hidden");
            div.innerHTML = `Estimasi Biaya<br><span class="text-2xl">$${hasil.toFixed(2)}</span>`;
        };

        // =====================
        // MODEL CNN
        // =====================
        let modelCNN = null;
        const classNames = ["Daisy", "Dandelion", "Roses", "Sunflowers", "Tulips"];

        async function loadModel() {
            console.log("TensorFlow :", tf.version.tfjs);
            console.log("Loading model...");
            
            try {
                modelCNN = await tf.loadLayersModel(
                    "https://mora759.github.io/TubesIlmuDataLanjut/tfjs_model/model.json"
                );
                console.log("Model Loaded");
                modelCNN.summary();
                
                document.getElementById("statusModel").innerHTML = "✅ Model berhasil dimuat";
                document.getElementById("statusModel").className = "text-green-600 font-bold";
            } catch (err) {
                console.error(err);
                document.getElementById("statusModel").innerHTML = "❌ " + err.message;
                document.getElementById("statusModel").className = "text-red-600 font-bold";
            }
        }

        if (typeof tf === "undefined") {
            alert("TensorFlow.js gagal dimuat!");
            return;
        }
        loadModel();

        // =====================
        // PREVIEW GAMBAR
        // =====================
        const input = document.getElementById("inputGambar");
        const preview = document.getElementById("previewGambar");

        if (input) {
            input.addEventListener("change", function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    preview.src = event.target.result;
                    preview.classList.remove("hidden");
                    const placeholder = document.getElementById("placeholderText");
                    if (placeholder) placeholder.classList.add("hidden");
                };
                reader.readAsDataURL(file);
            });
        }

        // =====================
        // PREDIKSI KLASIFIKASI
        // =====================
        window.prediksiGambar = async function() {
            if (modelCNN == null) {
                alert("Model belum selesai dimuat.");
                return;
            }

            // Validasi lebih aman
            if (!preview.src || preview.classList.contains("hidden")) {
                alert("Pilih gambar terlebih dahulu.");
                return;
            }

            if (!preview.complete) {
                await preview.decode();
            }

            const hasil = tf.tidy(() => {
                const tensor = tf.browser.fromPixels(preview)
                    .resizeBilinear([128, 128])
                    .toFloat()
                    .div(255.0)
                    .expandDims();
                return modelCNN.predict(tensor);
            });

            const probabilitas = await hasil.data();
            
            // Bersihkan Memori
            hasil.dispose();
            tf.disposeVariables(); 

            const index = probabilitas.indexOf(Math.max(...probabilitas));

            const divHasil = document.getElementById("hasilKlasifikasi");
            divHasil.classList.remove("hidden");
            divHasil.innerHTML = `<b>${classNames[index]}</b><br>Akurasi : ${(probabilitas[index] * 100).toFixed(2)}%`;
        };
    });
    </script>
</body>
</html>
